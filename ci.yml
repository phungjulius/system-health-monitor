name: System Health Monitor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # runs every 3 hours — catches drift that only shows up under load
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Validation framework unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results.xml

  live-health-check:
    name: Live system health measurement
    runs-on: ubuntu-latest
    needs: unit-tests      # only runs if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run system health monitor
        # exit code 1 = warnings (allowed in CI), exit code 2 = critical (fail)
        run: |
          python main.py
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "Critical failures detected — failing the build."
            exit 1
          fi
          exit 0

      - name: Upload health reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-reports
          path: reports/
